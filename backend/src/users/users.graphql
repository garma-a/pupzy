"""
Represents a registered Pupzy user.
Created automatically on first Firebase login — no explicit signup required.
"""
type User {
  id: ID!
  email: String!
  """
  Display name — null until the user completes their profile.
  """
  fullName: String
  """
  Arabic display name.
  """
  fullNameArabic: String
  profilePictureUrl: String
  """
  Whether the user has passed additional identity verification
  (set after at least one successful adoption or sale).
  """
  isVerified: Boolean!
  phoneNumber: String
  """
  Whether the user has completed their onboarding profile (phoneNumber + city are both set).
  Always false after the very first login — frontend should redirect to profile-completion screen.
  This is a computed field and is never stored in the database.
  """
  profileComplete: Boolean!
  """
  UUID of the user's home city. Null until the user completes their profile.
  """
  homeCityId: ID
  """
  The user's home city, resolved via DataLoader. Null until completeProfile is called.
  """
  city: City
  """
  Total number of posts across all types.
  """
  postCount: Int!
  """
  Number of RESCUE posts created.
  """
  rescuePostCount: Int!
  """
  Number of LOST posts created.
  """
  lostPostCount: Int!
  """
  Number of ADOPTION posts created.
  """
  adoptionPostCount: Int!
  """
  Number of PRODUCT posts created.
  """
  productPostCount: Int!
  """
  Preferred interface language. Default 'ar' (Arabic-first for Egypt).
  """
  languagePreference: String
  """
  Whether push notifications are enabled.
  """
  notificationsEnabled: Boolean!
  """
  Timestamp of the user's most recent authenticated request.
  """
  lastSeenAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""
Input for the completeProfile mutation.
Must be called once after the very first login to unlock full app functionality.
"""
input CompleteProfileInput {
  """
  User's display name. Between 2 and 120 characters.
  """
  fullName: String!
  """
  Phone number in E.164 format (e.g. +201012345678).
  """
  phoneNumber: String!
  """
  UUID of the user's city from the cities table. Optional if location is provided.
  """
  cityId: ID

  """
  GPS coordinates to auto-resolve the nearest city. Optional if cityId is provided.
  """
  location: GeoLocationInput
}

"""
Input for updating the user's location based on GPS.
"""
input GeoLocationInput {
  latitude: Float!
  longitude: Float!
}

"""
Input for the updateProfile mutation.
Used to update profile details after the profile has been completed.
"""
input UpdateProfileInput {
  """
  User's display name. Between 2 and 120 characters.
  """
  fullName: String!
  """
  Phone number in E.164 format (e.g. +201012345678). Optional — only update if changing.
  """
  phoneNumber: String
}

"""
ISO-8601 date-time string, always in UTC.
"""
scalar DateTime

type Query {
  """
  Returns the currently authenticated user.
  Requires a valid Firebase Bearer token.
  """
  me: User!
}

type Mutation {
  """
  Completes a user's profile on first login.
  Sets fullName, phoneNumber, and home city.
  Requires authentication.
  """
  completeProfile(input: CompleteProfileInput!): User!

  """
  Updates a user's profile (e.g., changing their display name).
  Requires authentication.
  """
  updateProfile(input: UpdateProfileInput!): User!

  """
  Updates the user's location based on GPS coordinates.
  Automatically resolves the nearest city.
  Requires authentication.
  """
  updateMyLocation(location: GeoLocationInput!): User!
}

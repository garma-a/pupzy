info:
  name: my_profile_info_query
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{BaseUrl}}"
  body:
    query: |-
      query Me {
        me {
          id
          email
          fullName
          fullNameArabic
          profilePictureUrl
          isVerified
          phoneNumber
          profileComplete
          homeCityId
          city {
            id
            nameEnglish
            nameArabic
            governorate
          }
          postCount
          rescuePostCount
          lostPostCount
          adoptionPostCount
          productPostCount
          languagePreference
          notificationsEnabled
          lastSeenAt
          createdAt
          updatedAt
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

info:
  name: my_profile_info_query
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{BaseUrl}}"
  body:
    query: |
      query {
        me {
          id,
          fullName
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

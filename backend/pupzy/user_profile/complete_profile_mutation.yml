info:
  name: complete_profile_mutation
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{BaseUrl}}"
  headers:
    - name: Authorization
      value: "{{auth}}"
  body:
    query: |-
      mutation CompleteProfile(
        $fullName: String!
        $phoneNumber: String!
        $cityId: ID
      ) {
        completeProfile(
          input: { fullName: $fullName, phoneNumber: $phoneNumber, cityId: $cityId }
        ) {
          id
          email
          fullName
          fullNameArabic
          profilePictureUrl
          isVerified
          phoneNumber
          profileComplete
          homeCityId
          city {
            id
            nameEnglish
            nameArabic
            governorate
          }
          postCount
          rescuePostCount
          lostPostCount
          adoptionPostCount
          productPostCount
          languagePreference
          notificationsEnabled
          lastSeenAt
          createdAt
          updatedAt
        }
      }
    variables: |-
      {
        "fullName": "Your Name",
        "phoneNumber": "+201012345678",
        "cityId": "019f4d3c-eef1-70f9-aa58-d55d778c897d"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

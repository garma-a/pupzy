info:
  name: update_profile_mutation
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{BaseUrl}}"
  body:
    query: |
      mutation updateProfile($input: UpdateProfileInput!) {
        updateProfile(input: $input) {
          id
          fullName
          city{
            id,
            nameEn
          }
        }
      }
    variables: |-
      {
        "input": {
          "fullName": "patrick"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

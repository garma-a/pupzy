info:
  name: update_profile_mutation
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{BaseUrl}}"
  body:
    query: |-
      mutation updateProfile($fullName: String!, $phoneNumber: String) {
        updateProfile(input: { fullName: $fullName, phoneNumber: $phoneNumber }) {
          id
          email
          fullName
          fullNameArabic
          profilePictureUrl
          isVerified
          phoneNumber
          profileComplete
          homeCityId
          city {
            id
            nameEnglish
            nameArabic
            governorate
          }
          postCount
          rescuePostCount
          lostPostCount
          adoptionPostCount
          productPostCount
          languagePreference
          notificationsEnabled
          lastSeenAt
          createdAt
          updatedAt
        }
      }
    variables: |-
      {
        "fullName": "patrick",
        "phoneNumber": "+201278203355"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

info:
  name: cities_query
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{BaseUrl}}"
  body:
    query: |-
      query{
        cities{
          id,
          nameEnglish,
          nameArabic,
          governorate
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

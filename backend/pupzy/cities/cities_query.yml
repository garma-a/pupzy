info:
  name: cities_query
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{BaseUrl}}"
  headers:
    - name: Authorization
      value: "{{auth}}"
  body:
    query: |-
      query{
        cities{
          id,
          nameAr,
          nameEn
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
